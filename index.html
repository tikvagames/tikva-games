<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tikva Games - Neon Game Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* Reset & Base */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #0b0b0f; 
  color: #fff; 
  font-family: 'Share Tech Mono', monospace; 
  overflow-x: hidden; 
  cursor: none;
}

/* Custom Cursor */
.cursor {
  position: fixed;
  width: 30px;
  height: 30px;
  border: 2px solid #0ff;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: transform 0.1s ease, background 0.2s ease;
  z-index: 9999;
}

/* HUD Navigation */
nav.hud {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 25px;
  padding: 15px 30px;
  backdrop-filter: blur(12px);
  background: rgba(0, 255, 255, 0.05);
  border: 1px solid #0ff;
  border-radius: 15px;
  animation: scan 3s infinite linear;
  z-index: 1000;
}
nav.hud a {
  color: #0ff;
  text-decoration: none;
  font-weight: 700;
  position: relative;
  transition: 0.3s;
}
nav.hud a::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0%;
  height: 2px;
  background: #0ff;
  transition: 0.3s;
}
nav.hud a:hover::after { width: 100%; }

@keyframes scan {
  0% { box-shadow: 0 0 5px #0ffaa0; }
  50% { box-shadow: 0 0 15px #0ff; }
  100% { box-shadow: 0 0 5px #0ffaa0; }
}

/* Hero Section */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
  perspective: 1000px;
}
.hero-bg {
  position: absolute;
  width: 120%;
  height: 120%;
  background: linear-gradient(135deg,#05050a,#0b0b0f);
  top: -10%; left: -10%;
  transform: translateZ(-100px) scale(1.2);
}
.hero-layer {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
  mix-blend-mode: screen;
}
.hero-layer img {
  position: absolute;
  width: 250px;
  transition: transform 0.2s ease;
}

/* Hero Content */
.hero-content {
  position: relative;
  z-index: 10;
  text-align: center;
  top: 35%;
}
.hero-content h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 4rem;
  color: #0ff;
  text-shadow: 0 0 20px #0ff, 0 0 40px #0ff33;
}
.hero-content p {
  margin-top: 15px;
  font-size: 1.2rem;
  color: #0ff88;
  text-shadow: 0 0 8px #0ff33;
}

/* Buttons */
.btn {
  margin-top: 30px;
  padding: 15px 40px;
  border: 2px solid #0ff;
  border-radius: 30px;
  color: #0ff;
  text-decoration: none;
  font-weight: bold;
  font-family: 'Orbitron';
  margin-right: 20px;
  transition: 0.3s;
}
.btn:hover {
  background: #0ff;
  color: #000;
  box-shadow: 0 0 30px #0ff;
  transform: scale(1.1) rotate(-2deg);
}

/* Sections */
section {
  padding: 100px 20px;
  text-align: center;
}
section h2 {
  font-family: 'Orbitron';
  font-size: 2.5rem;
  margin-bottom: 50px;
  color: #0ff;
}

/* Cards (Games List) */
.games-list {
  display: flex;
  gap: 30px;
  overflow-x: auto;
  padding-bottom: 30px;
}
.games-list::-webkit-scrollbar { display: none; }
.game-card {
  min-width: 250px;
  background: rgba(0,255,255,0.05);
  border: 1px solid #0ff;
  border-radius: 15px;
  padding: 20px;
  transition: 0.3s;
}
.game-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 25px #0ff;
}

/* Dev Blog Terminal Section */
.terminal {
  background: rgba(0,0,0,0.9);
  border: 1px solid #0ff;
  border-radius: 10px;
  padding: 30px;
  color: #0ff;
  font-family: 'Share Tech Mono', monospace;
  max-width: 800px;
  margin: 0 auto;
}

/* Parallax Layers Example */
.layer1 { top: 20%; left: 10%; }
.layer2 { top: 50%; left: 70%; }
.layer3 { top: 70%; left: 30%; }

/* Scroll Animations */
section { opacity: 0; transform: translateY(40px); transition: 1s; }
section.active { opacity: 1; transform: translateY(0); }

</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<!-- HUD Navigation -->
<nav class="hud">
  <a href="#hero">Home</a>
  <a href="#games">Games</a>
  <a href="#dev">Dev Blog</a>
</nav>

<!-- Hero Section -->
<div class="hero" id="hero">
  <div class="hero-bg"></div>
  <div class="hero-layer layer1"><img src="screen1.png" alt="Character1"></div>
  <div class="hero-layer layer2"><img src="screen2.png" alt="Character2"></div>
  <div class="hero-layer layer3"><img src="screen3.png" alt="Character3"></div>

  <div class="hero-content">
    <h1>Tikva Games</h1>
    <p>Play. Compete. Win in a neon world.</p>
    <a href="#" class="btn">Google Play</a>
    <a href="#" class="btn">LinkedIn</a>
  </div>
</div>

<!-- Games Section -->
<section id="games">
  <h2>Our Games</h2>
  <div class="games-list">
    <div class="game-card">⚡ Quick Puzzle</div>
    <div class="game-card">🎯 Skill Arena</div>
    <div class="game-card">💰 Reward Chase</div>
    <div class="game-card">🌀 Spin Challenge</div>
  </div>
</section>

<!-- Dev Blog Section -->
<section id="dev">
  <h2>Dev Blog</h2>
  <div class="terminal" id="terminal">
    <p id="terminal-text"></p>
  </div>
</section>

<script>
// Cursor
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// Parallax Hero
const layer1 = document.querySelector(".layer1 img");
const layer2 = document.querySelector(".layer2 img");
const layer3 = document.querySelector(".layer3 img");
document.addEventListener("mousemove", e => {
  let x = (window.innerWidth/2 - e.clientX)/50;
  let y = (window.innerHeight/2 - e.clientY)/50;
  layer1.style.transform = `translate(${x*3}px, ${y*3}px)`;
  layer2.style.transform = `translate(${x*5}px, ${y*5}px)`;
  layer3.style.transform = `translate(${x*2}px, ${y*2}px)`;
});

// Scroll animations
const sections = document.querySelectorAll("section");
window.addEventListener("scroll", ()=>{
  sections.forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight-100){
      sec.classList.add("active");
    }
  });
});

// Terminal typing animation
const terminalText = "Initializing Tikva Games Dev Log...\nMission briefing: Deploy interactive web experience.\nUpdating HUD interface...\n";
let i = 0;
function typeTerminal() {
  if(i < terminalText.length){
    document.getElementById("terminal-text").innerHTML += terminalText.charAt(i) === "\n" ? "<br>" : terminalText.charAt(i);
    i++;
    setTimeout(typeTerminal, 40);
  }
}
typeTerminal();
</script>

</body>
</html>
